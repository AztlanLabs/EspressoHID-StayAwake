; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitm-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 115200 ; Sometimes lowering this from 921600 helps stability
; Keep default flash/PSRAM settings for esp32-s3-devkitc-1 (N8, no PSRAM)

; Serial monitor settings (must match Serial.begin in code)
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0

build_flags = 
    -I include
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=0   ; No USB serial port exposed (stealth)
    ; -D DEBUG_MODE                ; Uncomment to enable Serial debug logs
    ;                              ; (also set ARDUINO_USB_CDC_ON_BOOT=1)

lib_deps =
    ; Standard library for USB HID
    USB